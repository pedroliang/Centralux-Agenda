<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Centralux-Agenda/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="description" content="Celtralux Agenda - agenda colaborativa com tarefas, alarmes e busca rápida" />
    <title>Celtralux Agenda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Aplica o tema ANTES do React montar para evitar flash
      (function () {
        try {
          var t = localStorage.getItem('celtralux-theme');
          if (t === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script type="module" crossorigin src="/Centralux-Agenda/assets/index-C3s_tgvb.js"></script>
    <link rel="stylesheet" crossorigin href="/Centralux-Agenda/assets/index-CoFF4XAP.css">
  </head>
  <body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">
    <div id="root"></div>
  </body>
</html>
